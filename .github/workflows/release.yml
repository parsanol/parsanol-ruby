---
name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type (use 'skip' to release existing version)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - pre
          - rc
          - beta
          - alpha
          - custom
          - skip
        default: "patch"
      custom_version:
        description: "Custom version (only used when bump_type is 'custom', e.g., 1.1.0, 1.1.0.rc.1)"
        required: false
        type: string
      draft:
        description: "Create as draft release"
        required: false
        type: boolean
        default: false
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  # Version management job
  prepare-version:
    name: Prepare version
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      sha: ${{ steps.version.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Install gem-release
        run: gem install gem-release

      - name: Determine and bump version
        id: version
        run: |
          # Configure git identity (required for gem bump to create commits)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ inputs.bump_type }}" = "skip" ]; then
            # Skip version bump - just read current version and create tag if needed
            echo "Skipping version bump, using current version..."
            VERSION=$(grep "VERSION =" lib/parsanol/version.rb | sed 's/.*"\([^"]*\)".*/\1/')
            SHA=$(git rev-parse HEAD)
            TAG="v$VERSION"

            # Check if tag already exists locally
            if git tag -l | grep -q "^${TAG}$"; then
              echo "Tag $TAG already exists locally"
            else
              echo "Creating tag $TAG..."
              git tag -a "$TAG" -m "Release $VERSION"
            fi
          else
            # Determine the version argument for gem-release
            if [ "${{ inputs.bump_type }}" = "custom" ]; then
              VERSION_ARG="${{ inputs.custom_version }}"
            else
              VERSION_ARG="${{ inputs.bump_type }}"
            fi

            # Bump version using gem-release (creates commit, tag, and pushes both)
            # Note: --tag creates tag locally, --push pushes both commit and tag to origin
            gem bump --version $VERSION_ARG --tag --push

            # Read the new version from the version file
            VERSION=$(grep "VERSION =" lib/parsanol/version.rb | sed 's/.*"\([^"]*\)".*/\1/')

            # Get the SHA of the commit gem-release just created
            SHA=$(git rev-parse HEAD)
            TAG="v${VERSION}"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Push version bump commit and tag
        run: |
          # Only needed when bump_type=skip (gem bump --push not used)
          if [ "${{ inputs.bump_type }}" = "skip" ]; then
            git push origin HEAD:${{ github.ref_name }}
            git push origin ${{ steps.version.outputs.tag }}
          fi

  ci-data:
    runs-on: ubuntu-22.04
    needs: prepare-version
    outputs:
      result: ${{ steps.fetch.outputs.result }}
    steps:
      - id: fetch
        uses: oxidize-rb/actions/fetch-ci-data@v1
        with:
          supported-ruby-platforms: |
            exclude: [arm-linux, x64-mingw32]
          stable-ruby-versions: |
            only: [3.2, 3.3, 3.4, 4.0]

  build:
    name: Build native gems
    needs: [prepare-version, ci-data]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        ruby-platform: ${{ fromJSON(needs.ci-data.outputs.result).supported-ruby-platforms }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-version.outputs.sha }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - uses: oxidize-rb/actions/cross-gem@v1
        id: cross-gem
        with:
          platform: ${{ matrix.ruby-platform }}
          ruby-versions: ${{ join(fromJSON(needs.ci-data.outputs.result).stable-ruby-versions, ',') }}

      - uses: actions/upload-artifact@v4
        with:
          name: cross-gem-${{ matrix.ruby-platform }}
          path: pkg/*-${{ matrix.ruby-platform }}.gem
          if-no-files-found: error

  # Smoke test Linux x86_64 gem
  smoke-linux:
    name: Smoke test Linux x86_64
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - uses: actions/download-artifact@v4
        with:
          name: cross-gem-x86_64-linux
          path: pkg/

      - name: Install and test gem
        run: |
          gem install pkg/parsanol-*.gem --verbose
          ruby .github/scripts/test_installed_gem.rb

  # Smoke test Linux ARM64 gem
  smoke-linux-arm:
    name: Smoke test Linux ARM64
    needs: build
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - uses: actions/download-artifact@v4
        with:
          name: cross-gem-aarch64-linux
          path: pkg/

      - name: Install and test gem
        run: |
          gem install pkg/parsanol-*.gem --verbose
          ruby .github/scripts/test_installed_gem.rb

  # Smoke test macOS Apple Silicon gem
  smoke-macos-arm:
    name: Smoke test macOS ARM64
    needs: build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - uses: actions/download-artifact@v4
        with:
          name: cross-gem-arm64-darwin
          path: pkg/

      - name: Install and test gem
        run: |
          gem install pkg/parsanol-*.gem --verbose
          ruby .github/scripts/test_installed_gem.rb

  # Smoke test macOS Intel gem
  smoke-macos-intel:
    name: Smoke test macOS x86_64
    needs: build
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - uses: actions/download-artifact@v4
        with:
          name: cross-gem-x86_64-darwin
          path: pkg/

      - name: Install and test gem
        run: |
          gem install pkg/parsanol-*.gem --verbose
          ruby .github/scripts/test_installed_gem.rb

  # Smoke test Windows x64 gem
  smoke-windows:
    name: Smoke test Windows x64
    needs: build
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - uses: actions/download-artifact@v4
        with:
          name: cross-gem-x64-mingw-ucrt
          path: pkg/

      - name: Install and test gem
        run: |
          gem install pkg/parsanol-*.gem --verbose
          ruby .github/scripts/test_installed_gem.rb

  # Smoke test Windows ARM64 gem
  smoke-windows-arm:
    name: Smoke test Windows ARM64
    needs: build
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - uses: actions/download-artifact@v4
        with:
          name: cross-gem-aarch64-mingw-ucrt
          path: pkg/

      - name: Install and test gem
        run: |
          gem install pkg/parsanol-*.gem --verbose
          ruby .github/scripts/test_installed_gem.rb

  release:
    name: Release
    needs: [prepare-version, build, smoke-linux, smoke-linux-arm, smoke-macos-arm, smoke-macos-intel, smoke-windows, smoke-windows-arm]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-version.outputs.sha }}
          fetch-depth: 0

      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          cargo-cache: true
          cache-version: v1

      - uses: actions/download-artifact@v4
        with:
          pattern: cross-gem-*
          merge-multiple: true
          path: pkg/

      - name: Package source gem
        run: bundle exec rake gem:native:any

      - name: List built gems
        run: ls -la pkg/

      - name: Configure RubyGems credentials for Trusted Publishing
        uses: rubygems/configure-rubygems-credentials@main

      - name: Push Gem
        working-directory: pkg/
        run: |
          set +e  # Disable exit on error so we can capture and show errors
          echo "Using trusted publishing..."
          echo "Listing gems to push..."
          ls -l
          final_exit=0
          for i in *.gem; do
            if [ -f "$i" ]; then
              echo "Pushing $i..."
              gem push "$i" 2>&1 | tee push.out
              gemerr=${PIPESTATUS[0]}
              echo "gem push exit code: $gemerr"
              if [ "$gemerr" -ne 0 ]; then
                if ! grep -q "Repushing of gem" push.out; then
                  echo "::error::Failed to push $i (exit code: $gemerr)"
                  final_exit=$gemerr
                else
                  echo "Gem already pushed, continuing..."
                fi
              fi
            fi
          done
          exit $final_exit

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.prepare-version.outputs.tag }}
          allowUpdates: true
          generateReleaseNotes: true
          draft: ${{ inputs.draft == true || inputs.draft == 'true' }}
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true
          skipIfReleaseExists: true
          prerelease: ${{ contains(needs.prepare-version.outputs.version, 'rc') || contains(needs.prepare-version.outputs.version, 'pre') || contains(needs.prepare-version.outputs.version, 'beta') || contains(needs.prepare-version.outputs.version, 'alpha') }}
