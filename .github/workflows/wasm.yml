# WASM/Opal CI
# Builds WebAssembly module and tests Opal (Ruby-to-JavaScript) integration
#
# Architecture:
#   Rust Core → WASM Build → Node.js Test → Opal Integration → npm Release
#
# This combined workflow handles all JavaScript/Web target testing and publishing.

name: wasm

on:
  push:
    branches: [ master, main ]
    paths:
      - 'ext/parsanol_native/**'
      - 'lib/parsanol/**'
      - '.github/workflows/wasm.yml'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.head_ref || github.ref_name }}'
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Build WASM module
  # ==========================================================================
  build:
    name: Build WASM module
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'

      - name: Build WASM (web target)
        run: |
          cd ext/parsanol_native
          wasm-pack build --target web --out-dir ../../lib/parsanol/wasm --scope plurimath -- --features wasm

      - name: Build WASM (nodejs target)
        run: |
          cd ext/parsanol_native
          wasm-pack build --target nodejs --out-dir ../../lib/parsanol/wasm-node --scope plurimath -- --features wasm

      - name: Verify WASM output
        run: |
          echo "=== Web target ==="
          ls -la lib/parsanol/wasm/
          echo ""
          echo "=== Node.js target ==="
          ls -la lib/parsanol/wasm-node/
          echo ""
          echo "=== WASM binary size ==="
          du -h lib/parsanol/wasm/parsanol_native_bg.wasm

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-modules
          path: |
            lib/parsanol/wasm/
            lib/parsanol/wasm-node/
          retention-days: 7

  # ==========================================================================
  # Test WASM in Node.js
  # ==========================================================================
  test-nodejs:
    name: Test WASM in Node.js
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-modules
          path: lib/parsanol/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test WASM module
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');

            // Verify WASM file exists and is valid
            const wasmPath = './lib/parsanol/wasm-node/parsanol_native_bg.wasm';
            if (!fs.existsSync(wasmPath)) {
              console.error('WASM binary not found at:', wasmPath);
              process.exit(1);
            }

            const stats = fs.statSync(wasmPath);
            console.log('WASM binary size:', stats.size, 'bytes');

            // Check WASM magic number (0x00 0x61 0x73 0x6D = '\\0asm')
            const buf = fs.readFileSync(wasmPath);
            const magic = buf.slice(0, 4);
            console.log('WASM magic:', magic.toString('hex'));
            if (magic.toString('hex') !== '0061736d') {
              throw new Error('Invalid WASM file - bad magic number');
            }

            console.log('WASM module validated successfully');
          "

  # ==========================================================================
  # Test Opal integration (Ruby transpiled to JavaScript + WASM)
  # ==========================================================================
  test-opal:
    name: Test Opal integration
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-modules
          path: lib/parsanol/

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Opal
        run: bundle exec gem install opal

      - name: Run Opal tests
        run: bundle exec rake spec:opal
        continue-on-error: true  # Opal tests may not be fully set up yet

  # ==========================================================================
  # Release WASM package to npm
  # ==========================================================================
  release-npm:
    name: Release to npm
    runs-on: ubuntu-latest
    needs: [test-nodejs, test-opal]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-modules
          path: lib/parsanol/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Get version
        id: version
        run: |
          VERSION=$(grep "VERSION =" lib/parsanol/version.rb | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create package.json
        run: |
          cd lib/parsanol/wasm
          cat > package.json << 'EOF'
          {
            "name": "@plurimath/parslet-wasm",
            "version": "${{ steps.version.outputs.version }}",
            "description": "WebAssembly build of Parslet parser for Opal/JavaScript",
            "main": "parsanol_native.js",
            "types": "parsanol_native.d.ts",
            "files": [
              "parsanol_native.js",
              "parsanol_native_bg.js",
              "parsanol_native_bg.wasm",
              "parsanol_native.d.ts"
            ],
            "keywords": ["parser", "peg", "wasm", "webassembly", "opal", "ruby"],
            "license": "MIT",
            "repository": {
              "type": "git",
              "url": "https://github.com/parsanol/parsanol-ruby.git"
            }
          }
          EOF

      - name: Publish to npm
        run: |
          cd lib/parsanol/wasm
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
