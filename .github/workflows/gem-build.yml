name: gem-build

on:
  workflow_call:
    inputs:
      platforms:
        description: 'JSON array of platforms to build (e.g., ["x86_64-linux", "arm64-darwin"])'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      platforms:
        description: 'JSON array of platforms to build'
        required: false
        type: string
        default: ''

concurrency:
  group: '${{ github.workflow }}-${{ github.head_ref || github.ref_name }}'
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  BUNDLER_VER: latest

jobs:
  prepare:
    name: Prepare platform matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        run: |
          if [[ -n "${{ inputs.platforms }}" ]]; then
            # Use provided platforms input
            PLATFORMS='${{ inputs.platforms }}'
          else
            # Read from platforms.json and extract platforms where build=true
            PLATFORMS=$(jq -c '[.platforms | to_entries[] | .value[] | select(.build == true) | {platform: .platform, os: .os, ruby: .ruby}]' .github/platforms.json)
          fi
          echo "matrix=$PLATFORMS" >> $GITHUB_OUTPUT

  build:
    name: build (${{ matrix.platform }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{
            (matrix.platform == 'aarch64-linux' || matrix.platform == 'aarch64-linux-gnu' || matrix.platform == 'aarch64-linux-musl') && 'aarch64-unknown-linux-gnu' ||
            (matrix.platform == 'x86_64-linux-musl') && 'x86_64-unknown-linux-musl' ||
            ''
          }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: ${{ env.BUNDLER_VER }}
          bundler-cache: true

      - name: Install cross-compilation tools (Linux ARM64 GNU)
        if: matrix.platform == 'aarch64-linux' || matrix.platform == 'aarch64-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install cross-compilation tools (Linux ARM64 musl)
        if: matrix.platform == 'aarch64-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu musl-tools
          # Create musl wrapper for aarch64
          sudo ln -sf /usr/bin/aarch64-linux-gnu-gcc /usr/bin/aarch64-linux-musl-gcc
          sudo ln -sf /usr/bin/aarch64-linux-gnu-g++ /usr/bin/aarch64-linux-musl-g++

      - name: Install cross-compilation tools (Linux x86_64 musl)
        if: matrix.platform == 'x86_64-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build native gem
        run: |
          bundle exec rake compile
          gem build parsanol-ruby.gemspec
          mkdir -p pkg
          mv *.gem pkg/ || true

      - name: Verify native extension
        if: matrix.platform != 'any'
        shell: bash
        run: |
          echo "=== Platform: ${{ matrix.platform }} ==="
          echo "=== Checking for compiled extension ==="
          FOUND=0
          for ext in bundle so dll dylib; do
            for f in lib/parsanol/*.$ext; do
              if [ -f "$f" ]; then
                echo "$f"
                file "$f"
                FOUND=1
              fi
            done
          done
          if [ "$FOUND" -eq 0 ]; then
            echo "ERROR: No compiled extension found!"
            ls -la lib/parsanol/
            exit 1
          fi

      - name: Inspect gem contents
        shell: bash
        run: |
          cd pkg/
          gem unpack parsanol-*.gem
          echo "=== Files in gem ==="
          ls -R */lib/ 2>/dev/null | head -50
          echo "=== Native extension in gem ==="
          FOUND=0
          for ext in bundle so dll dylib; do
            for f in $(find . -name "*.$ext" 2>/dev/null); do
              echo "$f"
              FOUND=1
            done
          done
          if [ "$FOUND" -eq 0 ] && [ "${{ matrix.platform }}" != "any" ]; then
            echo "ERROR: No native extension found in gem for platform ${{ matrix.platform }}"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs-${{ github.run_number }}-${{ matrix.platform }}
          path: tmp/**/*.log

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.run_number }}-${{ matrix.platform }}-pkg
          path: pkg/*.gem

      - if: matrix.platform != 'any'
        uses: actions/upload-artifact@v4
        with:
          name: lib-${{ github.run_number }}-${{ matrix.platform }}
          path: lib/parsanol/parsanol_native.*

  # Build WASM module
  build-wasm:
    name: Build WASM module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.5.0

      - name: Build WASM (web target)
        run: |
          cd ext/parsanol_native
          wasm-pack build --features wasm --target web --out-dir ../../lib/parsanol/wasm --scope plurimath

      - name: Build WASM (nodejs target)
        run: |
          cd ext/parsanol_native
          wasm-pack build --features wasm --target nodejs --out-dir ../../lib/parsanol/wasm-node --scope plurimath

      - name: Verify WASM build
        run: |
          echo "=== Web target ==="
          ls -la lib/parsanol/wasm/
          echo ""
          echo "=== Node.js target ==="
          ls -la lib/parsanol/wasm-node/
          echo ""
          echo "=== WASM binary size ==="
          du -h lib/parsanol/wasm/parsanol_native_bg.wasm

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-modules-${{ github.run_number }}
          path: |
            lib/parsanol/wasm/
            lib/parsanol/wasm-node/
