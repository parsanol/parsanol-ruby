name: gem-build

on:
  workflow_call:
    inputs:
      platforms:
        description: 'JSON array of platforms to build (e.g., ["x86_64-linux", "arm64-darwin"])'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      platforms:
        description: 'JSON array of platforms to build'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  packages: write

env:
  BUNDLER_VER: latest

jobs:
  prepare:
    name: Prepare platform matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        run: |
          if [[ -n "${{ inputs.platforms }}" ]]; then
            # Use provided platforms input
            PLATFORMS='${{ inputs.platforms }}'
          else
            # Read from platforms.json and extract platforms where build=true
            PLATFORMS=$(jq -c '[.platforms | to_entries[] | .value[] | select(.build == true) | {platform: .platform, os: .os, ruby: .ruby}]' .github/platforms.json)
          fi
          echo "matrix=$PLATFORMS" >> $GITHUB_OUTPUT

  build:
    name: build (${{ matrix.os }}, ${{ matrix.platform }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ (matrix.platform == 'aarch64-linux' || matrix.platform == 'aarch64-linux-gnu' || matrix.platform == 'aarch64-linux-musl') && 'aarch64-unknown-linux-gnu' || (matrix.platform == 'x86_64-linux-musl') && 'x86_64-unknown-linux-musl' || '' }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: ${{ env.BUNDLER_VER }}
          bundler-cache: true

      - name: Install cross-compilation tools (Linux ARM64 GNU)
        if: matrix.platform == 'aarch64-linux' || matrix.platform == 'aarch64-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install cross-compilation tools (Linux ARM64 musl)
        if: matrix.platform == 'aarch64-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu musl-tools

      - name: Install cross-compilation tools (Linux x86_64 musl)
        if: matrix.platform == 'x86_64-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - run: bundle exec rake gem:native:${{ matrix.platform }}

      - name: Inspect built libraries
        if: matrix.platform != 'any'
        shell: bash
        run: |
          echo "=== Platform: ${{ matrix.platform }} ==="
          echo "=== Compiled libraries ==="
          FOUND=0
          for ext in dll so dylib bundle; do
            for f in lib/parsanol/*.${ext} ext/parsanol_native/target/release/*.${ext}; do
              if [ -f "$f" ]; then
                echo "$f"
                FOUND=1
              fi
            done
          done
          if [ "$FOUND" -eq 0 ]; then
            echo "WARNING: No compiled libraries found!"
            echo "=== Library directory contents ==="
            ls -la lib/parsanol/ 2>/dev/null || echo "Directory not found"
          fi

      - name: Inspect gem contents
        shell: bash
        run: |
          cd pkg/
          gem unpack parsanol-*.gem 2>/dev/null || true
          echo "=== Files in gem ==="
          ls -R */lib/ 2>/dev/null | head -50

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs-${{ github.run_number }}-${{ matrix.platform }}
          path: tmp/*/ports/*/*/*.log

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.run_number }}-${{ matrix.platform }}-pkg
          path: pkg/*.gem
