---
name: Build gems

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [main, master, "cross-gem/*", "pkg/*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-data:
    runs-on: ubuntu-22.04
    outputs:
      result: ${{ steps.fetch.outputs.result }}
    steps:
      - id: fetch
        uses: oxidize-rb/actions/fetch-ci-data@v1
        with:
          supported-ruby-platforms: |
            exclude: [arm-linux, x64-mingw32, arm64-mingw-ucrt]
          stable-ruby-versions: |
            exclude: [head]

  native:
    name: Build native gems
    needs: ci-data
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        ruby-platform: ${{ fromJSON(needs.ci-data.outputs.result).supported-ruby-platforms }}
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - uses: oxidize-rb/actions/cross-gem@v1
        id: cross-gem
        with:
          platform: ${{ matrix.ruby-platform }}
          ruby-versions: ${{ join(fromJSON(needs.ci-data.outputs.result).stable-ruby-versions, ',') }}

      - uses: actions/upload-artifact@v4
        with:
          name: cross-gem-${{ matrix.ruby-platform }}
          path: ${{ steps.cross-gem.outputs.gem-path }}
          if-no-files-found: error

  # Smoke test Linux x86_64 gem
  smoke-linux:
    name: Smoke test Linux x86_64
    needs: native
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - uses: actions/download-artifact@v4
        with:
          name: cross-gem-x86_64-linux
          path: pkg/

      - name: Install and test gem
        run: |
          gem install pkg/parsanol-*.gem --verbose
          ruby -e "require 'parsanol'; puts 'Native available: ' + Parsanol::Native.available?.to_s"

  # Smoke test Linux ARM64 gem
  smoke-linux-arm:
    name: Smoke test Linux ARM64
    needs: native
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - uses: actions/download-artifact@v4
        with:
          name: cross-gem-aarch64-linux
          path: pkg/

      - name: Install and test gem
        run: |
          gem install pkg/parsanol-*.gem --verbose
          ruby -e "require 'parsanol'; puts 'Native available: ' + Parsanol::Native.available?.to_s"

  # Smoke test macOS Apple Silicon gem
  smoke-macos-arm:
    name: Smoke test macOS ARM64
    needs: native
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - uses: actions/download-artifact@v4
        with:
          name: cross-gem-arm64-darwin
          path: pkg/

      - name: Install and test gem
        run: |
          gem install pkg/parsanol-*.gem --verbose
          ruby -e "require 'parsanol'; puts 'Native available: ' + Parsanol::Native.available?.to_s"

  # Smoke test macOS Intel gem
  smoke-macos-intel:
    name: Smoke test macOS x86_64
    needs: native
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - uses: actions/download-artifact@v4
        with:
          name: cross-gem-x86_64-darwin
          path: pkg/

      - name: Install and test gem
        run: |
          gem install pkg/parsanol-*.gem --verbose
          ruby -e "require 'parsanol'; puts 'Native available: ' + Parsanol::Native.available?.to_s"

  # Smoke test Windows x64 gem
  smoke-windows:
    name: Smoke test Windows x64
    needs: native
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - uses: actions/download-artifact@v4
        with:
          name: cross-gem-x64-mingw-ucrt
          path: pkg/

      - name: Install and test gem
        run: |
          gem install pkg/parsanol-*.gem --verbose
          ruby -e "require 'parsanol'; puts 'Native available: ' + Parsanol::Native.available?.to_s"

  # Smoke test Windows ARM64 gem
  smoke-windows-arm:
    name: Smoke test Windows ARM64
    needs: native
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - uses: actions/download-artifact@v4
        with:
          name: cross-gem-arm64-mingw-ucrt
          path: pkg/

      - name: Install and test gem
        run: |
          gem install pkg/parsanol-*.gem --verbose
          ruby -e "require 'parsanol'; puts 'Native available: ' + Parsanol::Native.available?.to_s"

  source:
    name: Build source gem
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          cargo-cache: true
          cache-version: v1

      - name: Build source gem
        run: bundle exec rake gem:native:any

      - uses: actions/upload-artifact@v4
        with:
          name: cross-gem-any
          path: pkg/*.gem
          if-no-files-found: error
