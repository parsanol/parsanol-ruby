name: gem-build

on:
  workflow_call:
    inputs:
      platforms:
        description: 'JSON array of platforms to build (e.g., ["x86_64-linux", "arm64-darwin"])'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      platforms:
        description: 'JSON array of platforms to build'
        required: false
        type: string
        default: ''

concurrency:
  group: '${{ github.workflow }}-${{ github.head_ref || github.ref_name }}'
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    name: Prepare platform matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        run: |
          if [[ -n "${{ inputs.platforms }}" ]]; then
            PLATFORMS='${{ inputs.platforms }}'
          else
            # Extract platforms where build=true
            PLATFORMS=$(jq -c '[.platforms | to_entries[] | .value[] | select(.build == true) | .platform]' .github/platforms.json)
          fi
          echo "matrix=$PLATFORMS" >> $GITHUB_OUTPUT

  # Cross-compile ALL platforms using oxidize-rb/actions (uses Docker)
  build:
    name: build (${{ matrix.platform }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Cross-compile native gem
        uses: oxidize-rb/actions/cross-gem@v1
        with:
          platform: ${{ matrix.platform }}

      - name: Inspect gem
        run: |
          echo "=== Built gems ==="
          ls -la pkg/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.run_number }}-${{ matrix.platform }}-pkg
          path: pkg/*.gem
