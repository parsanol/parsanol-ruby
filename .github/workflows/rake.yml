---
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-data:
    runs-on: ubuntu-22.04
    outputs:
      result: ${{ steps.fetch.outputs.result }}
    steps:
      - id: fetch
        uses: oxidize-rb/actions/fetch-ci-data@v1
        with:
          stable-ruby-versions: |
            exclude: [head]

  ci:
    runs-on: ${{ matrix.os }}
    needs: ci-data
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-15]
        ruby: ${{ fromJSON(needs.ci-data.outputs.result).stable-ruby-versions }}
    steps:
      - uses: actions/checkout@v4

      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          cargo-cache: true
          cache-version: v1

      - name: Compile rust ext
        run: bundle exec rake compile

      - name: Run ruby tests
        run: bundle exec rspec spec/ --format progress

      - name: Run performance benchmarks
        if: matrix.os == 'ubuntu-22.04' && matrix.ruby == '3.4'
        run: bundle exec rspec spec/performance/native_benchmark_spec.rb --format documentation

  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Lint ruby
        run: bundle exec rubocop

  clippy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.4"
          rustup-components: clippy

      - name: Lint rust
        run: |
          cd ext/parsanol_native
          cargo clippy --all-features -- -D warnings
          cargo fmt --check
