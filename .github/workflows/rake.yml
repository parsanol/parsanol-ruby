---
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-data:
    runs-on: ubuntu-22.04
    outputs:
      result: ${{ steps.fetch.outputs.result }}
    steps:
      - id: fetch
        uses: oxidize-rb/actions/fetch-ci-data@v1
        with:
          stable-ruby-versions: |
            exclude: [head]

  ci:
    runs-on: ${{ matrix.os }}
    needs: ci-data
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (cache only on 3.4)
          - os: ubuntu-22.04
            ruby: "3.2"
            cargo-cache: "false"
          - os: ubuntu-22.04
            ruby: "3.3"
            cargo-cache: "false"
          - os: ubuntu-22.04
            ruby: "3.4"
            cargo-cache: true
          - os: ubuntu-22.04
            ruby: "4.0"
            cargo-cache: "false"

          # Linux ARM64
          - os: ubuntu-22.04-arm
            ruby: "3.2"
            cargo-cache: "false"
          - os: ubuntu-22.04-arm
            ruby: "3.3"
            cargo-cache: "false"
          - os: ubuntu-22.04-arm
            ruby: "3.4"
            cargo-cache: "false"
          - os: ubuntu-22.04-arm
            ruby: "4.0"
            cargo-cache: "false"

          # macOS Intel (cache only on 3.4)
          - os: macos-15-intel
            ruby: "3.2"
            cargo-cache: "false"
          - os: macos-15-intel
            ruby: "3.3"
            cargo-cache: "false"
          - os: macos-15-intel
            ruby: "3.4"
            cargo-cache: true
          - os: macos-15-intel
            ruby: "4.0"
            cargo-cache: "false"

          # macOS Apple Silicon (cache only on 3.4)
          - os: macos-15
            ruby: "3.2"
            cargo-cache: "false"
          - os: macos-15
            ruby: "3.3"
            cargo-cache: "false"
          - os: macos-15
            ruby: "3.4"
            cargo-cache: true
          - os: macos-15
            ruby: "4.0"
            cargo-cache: "false"

          # Windows x64 (cache only on 3.4)
          - os: windows-2025
            ruby: "3.2"
            cargo-cache: "false"
          - os: windows-2025
            ruby: "3.3"
            cargo-cache: "false"
          - os: windows-2025
            ruby: "3.4"
            cargo-cache: true
          - os: windows-2025
            ruby: "4.0"
            cargo-cache: "false"

          # NOTE: Windows ARM64 is disabled until rb-sys adds native library support
          # for aarch64-pc-windows-msvc target.
          # See: https://github.com/oxidize-rb/rb-sys/issues/XXX
    steps:
      - uses: actions/checkout@v4

      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          cargo-cache: ${{ matrix.cargo-cache }}
          cache-version: v1

      - name: Compile rust ext
        run: bundle exec rake compile

      - name: Run ruby tests
        run: bundle exec rspec spec/ --format progress

      - name: Run performance benchmarks
        if: matrix.os == 'ubuntu-22.04' && matrix.ruby == '3.4'
        run: bundle exec rspec spec/performance/native_benchmark_spec.rb --format documentation

  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Lint ruby
        run: bundle exec rubocop

  clippy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.4"
          rustup-components: clippy
          cargo-cache: "false"

      - name: Lint rust
        run: |
          cd ext/parsanol_native
          cargo clippy --all-features -- -D warnings
          cargo fmt --check
