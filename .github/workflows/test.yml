name: test-gems

on:
  push:
    branches: [ master, main, 'fast-mode' ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.job }}-${{ github.head_ref || github.ref_name }}'
  cancel-in-progress: true

env:
  BUNDLER_VER: latest

permissions:
  contents: read
  packages: write

jobs:
  # Build all gems first
  build:
    name: Build gems
    uses: ./.github/workflows/gem-build.yml

  prepare:
    name: Prepare test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        run: |
          # Read platforms.json and generate test matrix
          # For each platform where test=true, create entries for each test_os and ruby version
          MATRIX=$(jq -c '{
            include: [
              .platforms
              | to_entries[]
              | .value[]
              | select(.test == true)
              | .ruby_versions as $ruby_versions
              | .platform as $platform
              | .test_os as $test_os
              | $test_os[] as $os
              | $ruby_versions[] as $ruby
              | {os: $os, platform: $platform, ruby: $ruby}
            ]
          }' .github/platforms.json)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  # Test pre-built gems on multiple platforms
  test-gem:
    needs: [build, prepare]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            spec
            .github/scripts

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: ${{ env.BUNDLER_VER }}

      - name: Download pre-built gem
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.run_number }}-${{ matrix.platform }}-pkg
          path: pkg

      - name: Install native gem
        run: |
          cd pkg
          gem install parsanol-*.gem --verbose

      - name: Test installed gem
        run: |
          ruby .github/scripts/test_installed_gem.rb
