---
name: Test gems

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-data:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.fetch.outputs.result }}
    steps:
      - id: fetch
        uses: oxidize-rb/actions/fetch-ci-data@v1
        with:
          supported-ruby-platforms: |
            exclude: [arm-linux, x64-mingw32]
          stable-ruby-versions: |
            exclude: [head]

  build:
    name: Build gems
    uses: ./.github/workflows/gem-build.yml

  test:
    name: Test ${{ matrix.ruby-platform }} on ${{ matrix.os }}
    needs: [ci-data, build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            ruby-platform: x86_64-linux
            ruby: "3.4"
          - os: ubuntu-22.04-arm
            ruby-platform: aarch64-linux
            ruby: "3.4"
          - os: macos-latest
            ruby-platform: arm64-darwin
            ruby: "3.4"
          - os: macos-13
            ruby-platform: x86_64-darwin
            ruby: "3.4"
          - os: windows-latest
            ruby-platform: x64-mingw-ucrt
            ruby: "3.4"
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/scripts

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}

      - uses: actions/download-artifact@v4
        with:
          name: cross-gem-${{ matrix.ruby-platform }}
          path: pkg/

      - name: Install gem
        run: gem install pkg/parsanol-*.gem --verbose

      - name: Test installed gem
        run: ruby .github/scripts/test_installed_gem.rb
