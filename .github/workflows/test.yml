name: test

on:
  push:
    branches: [ master, main, 'fast-mode' ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.job }}-${{ github.head_ref || github.ref_name }}'
  cancel-in-progress: true

env:
  BUNDLER_VER: latest

permissions:
  contents: read
  packages: write

jobs:
  # Build all gems first
  build:
    name: Build gems
    uses: ./.github/workflows/gem-build.yml

  prepare:
    name: Prepare test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        run: |
          # Read platforms.json and generate test matrix
          # For each platform where test=true, create entries for each test_os and ruby version
          MATRIX=$(jq -c '{
            include: [
              .platforms
              | to_entries[]
              | .value[]
              | select(.test == true)
              | .ruby_versions as $ruby_versions
              | .platform as $platform
              | .test_os as $test_os
              | $test_os[] as $os
              | $ruby_versions[] as $ruby
              | {os: $os, platform: $platform, ruby: $ruby}
            ]
          }' .github/platforms.json)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  # Run tests using pre-built gems - install and verify
  test:
    needs: [build, prepare]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            spec
            .github/scripts

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: ${{ env.BUNDLER_VER }}

      - name: Download pre-built gem
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.run_number }}-${{ matrix.platform }}-pkg
          path: pkg

      - name: List gem contents
        shell: bash
        run: |
          cd pkg
          echo "=== Downloaded gems ==="
          ls -la
          echo ""
          echo "=== Unpacking gem ==="
          gem unpack parsanol-*.gem
          echo ""
          echo "=== Files in gem ==="
          ls -R */lib/ 2>/dev/null | head -50
          echo ""
          echo "=== Native extension in gem ==="
          for ext in bundle so dll dylib; do
            for f in $(find . -name "*.$ext" 2>/dev/null); do
              echo "Found: $f"
              file "$f" || true
            done
          done

      - name: Install native gem
        run: |
          cd pkg
          gem install parsanol-*.gem --verbose

      - name: Verify gem installation
        run: |
          echo "=== Installed gems ==="
          gem list parslet
          echo ""
          echo "=== Gem contents ==="
          gem contents parsanol | head -30

      - name: Test installed gem
        run: |
          ruby .github/scripts/test_installed_gem.rb

  # Run RuboCop lint
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler: ${{ env.BUNDLER_VER }}
          bundler-cache: true

      - name: Run RuboCop
        run: bundle exec rubocop

  # Run RBS signature checks
  rbs:
    name: RBS Signatures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler: ${{ env.BUNDLER_VER }}
          bundler-cache: true

      - name: Install Steep
        run: gem install steep

      - name: Run Steep type check
        run: steep check
        continue-on-error: true

  # Run Clippy for Rust code
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run Clippy
        run: |
          cd ext/parsanol_native
          cargo clippy --all-features -- -D warnings

  # Run benchmarks
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler: ${{ env.BUNDLER_VER }}
          bundler-cache: true

      - name: Compile native extension
        run: bundle exec rake compile

      - name: Run benchmarks
        run: bundle exec rspec spec/performance/native_benchmark_spec.rb --format documentation
