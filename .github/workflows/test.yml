name: test

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.job }}-${{ github.head_ref || github.ref_name }}'
  cancel-in-progress: true

env:
  BUNDLER_VER: latest

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build gems
    uses: ./.github/workflows/gem-build.yml

  prepare:
    name: Prepare test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        run: |
          # Read platforms.json and generate test matrix
          # For each platform where test=true, create entries for each test_os and ruby version
          MATRIX=$(jq -c '{
            include: [
              .platforms
              | to_entries[]
              | .value[]
              | select(.test == true)
              | .test_os as $test_os
              | .platform as $platform
              | ["3.1", "3.2", "3.3", "3.4"] as $ruby_versions
              | $test_os[]
              | . as $os
              | $ruby_versions[]
              | {os: $os, platform: $platform, ruby: .}
            ]
          }' .github/platforms.json)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  test:
    needs: [build, prepare]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            spec
            .github/scripts

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: ${{ env.BUNDLER_VER }}

      - uses: actions/download-artifact@v4
        with:
          name: ${{ github.run_number }}-${{ matrix.platform }}-pkg
          path: pkg

      - name: Inspect gem contents
        shell: bash
        run: |
          cd pkg
          gem unpack parsanol-*.gem 2>/dev/null || true
          echo "=== Platform: ${{ matrix.platform }} ==="
          echo "=== Compiled libraries in gem ==="
          FOUND=0
          for ext in dll so dylib; do
            for f in $(find . -name "*.$ext" 2>/dev/null); do
              echo "$f"
              FOUND=1
            done
          done
          if [ "$FOUND" -eq 0 ]; then
            echo "ERROR: No compiled libraries found in gem!"
            echo "=== Full lib directory contents ==="
            ls -la */lib/parsanol/ 2>/dev/null || echo "Directory not found"
            exit 1
          fi
          echo "=== Full lib directory contents ==="
          ls -la */lib/parsanol/

      - name: Install native gem
        run: |
          cd pkg
          gem install parsanol-*.gem

      - name: Test installed gem
        run: ruby .github/scripts/test_installed_gem.rb

      - name: Run full test suite
        run: |
          bundle install
          bundle exec rspec spec/ --format progress
