inherit_from: .rubocop_todo.yml

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.2
  SuggestExtensions: false
  Exclude:
    - vendor/**/*
    - tmp/**/*
    - benchmark/**/*
    - spec/fixtures/**/*
    - lib/**/*

# Metrics - allow longer methods in test files
Metrics/BlockLength:
  Exclude:
    - spec/**/*
    - Rakefile
    - Steepfile
    - example/**/*
    - parsanol.gemspec

Metrics/MethodLength:
  Max: 20
  Exclude:
    - example/**/*
    - spec/**/*

Metrics/ClassLength:
  Max: 200
  Exclude:
    - example/**/*

Metrics/AbcSize:
  Max: 20
  Exclude:
    - example/**/*
    - spec/**/*

Metrics/CyclomaticComplexity:
  Exclude:
    - example/**/*

Metrics/PerceivedComplexity:
  Exclude:
    - example/**/*

Metrics/ModuleLength:
  Exclude:

Metrics/ParameterLists:
  Exclude:
    - spec/**/*
    - example/**/*

Metrics/BlockNesting:
  Max: 4
  Exclude:
    - example/**/*

# Style - prefer single quotes but allow double quotes for readability
Style/StringLiterals:
  EnforcedStyle: single_quotes
  ConsistentQuotesInMultiline: true
  Exclude:
    - spec/**/*

# Allow using braces for hash literals
Style/HashSyntax:
  EnforcedStyle: ruby19

# Layout
Layout/LineLength:
  Max: 120
  Exclude:
    - spec/**/*
    - example/**/*
    - parsanol.gemspec

# Documentation - not required for example or spec files
Style/Documentation:
  Exclude:
    - example/**/*
    - spec/**/*

Style/OneClassPerFile:
  Exclude:
    - example/**/*
    - spec/**/*

Style/FormatString:
  Exclude:
    - example/**/*

Style/FormatStringToken:
  Exclude:
    - example/**/*
    - Rakefile

Style/MixinUsage:
  Exclude:
    - example/**/*

Style/OptionalBooleanParameter:
  Exclude:
    - example/**/*

Style/ExponentialNotation:
  Exclude:
    - example/**/*

Style/ClassVars:
  Exclude:

Style/CaseEquality:
  Exclude:

Style/ComparableClamp:
  Exclude:

# Naming
Naming/MethodParameterName:
  Exclude:
    - example/**/*
    - spec/**/*

Naming/PredicateMethod:
  Exclude:
    - example/**/*

Naming/VariableNumber:
  Exclude:
    - example/**/*

Naming/AccessorMethodName:
  Exclude:
    - example/**/*

# Lint
Lint/StructNewOverride:
  Exclude:
    - example/**/*

Lint/ConstantDefinitionInBlock:
  Exclude:
    - spec/**/*

Lint/MissingSuper:
  Exclude:
    - example/**/*

Lint/EmptyClass:
  Exclude:
    - example/**/*

Lint/HashCompareByIdentity:
  Exclude:

Lint/DuplicateBranch:
  Exclude:
    - example/**/*

Lint/EmptyBlock:
  Exclude:
    - example/**/*
    - spec/**/*

Lint/BinaryOperatorWithIdenticalOperands:
  Exclude:
    - spec/**/*

Lint/SuppressedException:
  Exclude:
    - example/**/*
    - spec/**/*

Lint/DuplicateMethods:
  Exclude:

Lint/Void:
  Exclude:
    - spec/**/*

Lint/UnusedMethodArgument:
  Exclude:

Lint/FloatComparison:
  Exclude:
    - spec/**/*

# Security
Security/Eval:
  Exclude:
    - example/**/*

# Gemspec
Gemspec/DevelopmentDependencies:
  Exclude:
    - parsanol.gemspec

Gemspec/RequiredRubyVersion:
  Exclude:
    - parsanol.gemspec
